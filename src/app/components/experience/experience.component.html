<section class="experience section" id="experience">
  <div class="container">
    <div class="section-label" appReveal="up">
      <span class="label-line"></span>
      <span>Journey</span>
    </div>
    <h2 class="section-title text-center" appReveal="up">Experience & Education</h2>

    <div class="timeline">
      @for (item of items; track item.title) {
        <div class="timeline-item" [class.left]="item.side === 'left'" [class.right]="item.side === 'right'" appReveal="up">
          <div class="timeline-card">
            <div class="timeline-header">
              <span class="timeline-badge" [ngClass]="item.type">
                {{ item.type === 'work' ? 'Work' : 'Education' }}
              </span>
              <span class="timeline-date">{{ item.date }}</span>
            </div>
            <h3>{{ item.title }}</h3>
            <h4>{{ item.org }}</h4>
            <p>{{ item.desc }}</p>
          </div>
          <div class="timeline-dot"></div>
        </div>
      }
    </div>
  </div>
</section>
