<section class="projects section" id="projects">
  <div class="container">
    <div class="section-label" appReveal="up">
      <span class="label-line"></span>
      <span>My Work</span>
    </div>
    <h2 class="section-title text-center" appReveal="up">Featured Projects</h2>
    <p class="section-sub" appReveal="up">A selection of projects I've built with care</p>

    <!-- Filter bar -->
    <div class="filter-bar" appReveal="up" role="group" aria-label="Filter projects">
      @for (f of filters; track f.value) {
        <button
          class="filter-btn"
          [class.active]="activeFilter() === f.value"
          (click)="setFilter(f.value)">
          {{ f.label }}
        </button>
      }
    </div>

    <!-- Grid -->
    <div class="projects-grid">
      @for (project of filteredProjects; track project.num) {
        <article class="project-card" appReveal="up">
          <div class="project-img">
            <img [src]="project.img" [alt]="project.title" loading="lazy" />
            <div class="project-overlay">
              <div class="project-links">
                <a [href]="project.liveUrl" class="project-link" aria-label="View live site">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
                    <polyline points="15 3 21 3 21 9"/>
                    <line x1="10" y1="14" x2="21" y2="3"/>
                  </svg>
                </a>
                <a [href]="project.codeUrl" class="project-link" aria-label="View source code">
                  <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
                  </svg>
                </a>
              </div>
            </div>
          </div>
          <div class="project-body">
            <div class="project-tags">
              @for (tag of project.tags; track tag) {
                <span class="tag">{{ tag }}</span>
              }
            </div>
            <h3 class="project-title">{{ project.title }}</h3>
            <p class="project-desc">{{ project.desc }}</p>
            <span class="project-num">{{ project.num }}</span>
          </div>
        </article>
      }
    </div>
  </div>
</section>
